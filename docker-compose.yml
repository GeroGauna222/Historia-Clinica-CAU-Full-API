version: "3.9"

services:
  # ============================
  # 🐍 BACKEND (Flask)
  # ============================
  web:
    build: ./backend_flask/app
    container_name: historia_web
    restart: always
    # ports:
    #   - "5000:5000"   <-- COMENTADO POR SEGURIDAD (Solo Nginx accede aquí)
    volumes:
      - ./backend_flask/app:/app
      - ./db/migrations:/app/migrations:ro
      - uploads_data:/app/uploads # donde Flask guarda archivos subidos
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      - FLASK_ENV=${FLASK_ENV}
      - FLASK_DEBUG=${FLASK_DEBUG}
      - FLASK_APP=main.py
      - TZ=America/Argentina/Buenos_Aires
    command: bash -c "echo Starting Flask with ENV=$FLASK_ENV && /wait-for-it.sh db:3306 -- /app/start.sh"
    networks:
      - historia_net

  # ============================
  # 🗄️ BASE DE DATOS (MySQL)
  # ============================
  db:
    image: mysql:8.0
    container_name: historia_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: America/Argentina/Buenos_Aires
    command: --default-time-zone='America/Argentina/Buenos_Aires'
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - historia_net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ============================
  # ⛓️ INTEGRIDAD BFA (TSA API)
  # ============================
  # Ya no se usa un nodo Geth local. El sellado de integridad se hace contra la API
  # oficial de Timestamp Authority de la BFA (BFA_TSA_URL, por defecto
  # https://tsaapi.bfa.ar/api/tsa). No requiere contenedor propio.

  # ============================
  # 💻 FRONTEND (Vue 3 / Vite)
  # ============================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL} 
    container_name: historia_frontend
    restart: always
    networks:
      - historia_net

  # ============================
  # 🌍 REVERSE PROXY (NGINX)
  # ============================
  nginx:
    image: nginx:latest
    container_name: historia_nginx
    restart: always
    depends_on:
      - web
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${NGINX_CONF_FILE:-./nginx/default.dev.conf}:/etc/nginx/conf.d/default.conf:ro
      - uploads_data:/var/www/uploads # <--- El mismo volumen que usa Flask
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - historia_net

networks:
  historia_net:

volumes:
  db_data:
  uploads_data:
